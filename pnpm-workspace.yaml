# Root workspace: `packages: ["*"]` makes every top-level dir that has a
# package.json a workspace project, so `pnpm -r install` / `pnpm -r build`
# operate on every tool. The settings below carry over the repo's prior root
# config (skip pnpm 11's pre-run auto-install and release-age cooldown) plus
# the union of the per-tool allowBuilds maps (pnpm 11 blocks dependency build
# scripts by default; these need theirs to fetch native binaries).
packages:
  - "*"
verifyDepsBeforeRun: false
minimumReleaseAge: 0
allowBuilds:
  "@swc/core": true
  cbor-extract: true
  core-js: true
  esbuild: true
configDependencies:
  pnpm-plugin-patchwork: "0.4.0+sha512-ppHlw5UOoMCzseTp0X1vmMnWen/AsDPLf0Ft9YMLERPItErfZVyeM1pWefKY0onXZrD43afyB2ZJx1ztLteMkA=="
minimumReleaseAgeExclude:
  - '@chee/patchwork-llm@0.1.0'
  - '@chee/patchwork-transcript@0.1.0'
  - '@chee/patchwork-bundles@0.0.1 || 0.1.0 || 0.2.0'
  - '@inkandswitch/patchwork-filesystem@0.1.2'
  - cute.txt@0.0.1 || 0.0.3 || 0.0.5 || 0.0.6
