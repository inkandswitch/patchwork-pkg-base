name: shell preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  SHELL_REPO: inkandswitch/patchwork.inkandswitch.com
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  ALIAS: shell-pr-${{ github.event.number }}
  MARKER: "<!-- shell-preview -->"

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SHELL_REPO }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: resolve tools bundle preview url
        id: bundle
        run: |
          site=$(curl -sf -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" | jq -r .name)
          echo "url=https://deploy-preview-${{ github.event.number }}--$site.netlify.app/modules.json" >> "$GITHUB_OUTPUT"

      - run: pnpm install --frozen-lockfile

      - name: build shell against this PR's tools bundle
        env:
          PATCHWORK_SYSTEM_PACKAGE_LIST_URL: ${{ steps.bundle.outputs.url }}
        run: pnpm build

      - name: deploy
        id: deploy
        run: |
          url=$(pnpm dlx netlify-cli deploy \
            --dir=dist \
            --alias="$ALIAS" \
            --message="shell for patchwork-base#${{ github.event.number }} @ ${{ github.event.pull_request.head.sha }}" \
            --json | jq -r .deploy_url)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - uses: actions/github-script@v7
        env:
          SHELL_URL: ${{ steps.deploy.outputs.url }}
          MODULES_URL: ${{ steps.bundle.outputs.url }}
        with:
          script: |
            const marker = process.env.MARKER
            const body = [
              marker,
              `**Shell preview:** ${process.env.SHELL_URL}`,
              ``,
              `Built from \`${process.env.SHELL_REPO}\` against this PR's tools bundle:`,
              `\`${process.env.MODULES_URL}\``,
            ].join("\n")
            const {owner, repo} = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({owner, repo, issue_number})
            const existing = comments.data.find(c => c.body.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body})
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body})
            }

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: delete alias deploys
        run: |
          api() { curl -sf -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" "$@"; }
          for page in 1 2 3 4 5; do
            deploys=$(api "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=100&page=$page")
            [ "$(echo "$deploys" | jq length)" = 0 ] && break
            for id in $(echo "$deploys" | jq -r --arg a "$ALIAS" \
              '.[] | select(.branch == $a or (.deploy_url // "" | contains("//" + $a + "--"))) | .id'); do
              echo "deleting deploy $id"
              api -X DELETE "https://api.netlify.com/api/v1/deploys/$id" -o /dev/null
            done
          done

      - uses: actions/github-script@v7
        with:
          script: |
            const marker = process.env.MARKER
            const {owner, repo} = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({owner, repo, issue_number})
            const existing = comments.data.find(c => c.body.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id,
                body: `${marker}\n**Shell preview:** torn down.`,
              })
            }
