name: patchwork preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  SHELL_REPO: inkandswitch/patchwork.inkandswitch.com
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  ALIAS: patchwork-preview-${{ github.event.number }}
  MARKER: "<!-- patchwork-preview -->"

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: shell
    steps:
      - uses: actions/checkout@v4
        with:
          path: base

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SHELL_REPO }}
          path: shell

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: shell/pnpm-lock.yaml

      - name: resolve package list url
        id: bundle
        run: |
          site=$(curl -sf -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" | jq -r .name)
          echo "url=https://deploy-preview-${{ github.event.number }}--$site.netlify.app/modules.json" >> "$GITHUB_OUTPUT"

      - run: pnpm install --frozen-lockfile

      - name: build shell against this PR's tools bundle
        env:
          PATCHWORK_SYSTEM_PACKAGE_LIST_URL: ${{ steps.bundle.outputs.url }}
        run: pnpm build

      - name: free the alias
        run: ../base/.github/scripts/netlify-purge-alias.sh

      - name: deploy
        id: deploy
        run: |
          set -o pipefail
          out=$(pnpm --package=netlify-cli dlx netlify deploy \
            --dir=dist \
            --no-build \
            --alias="$ALIAS" \
            --message="patchwork-base#${{ github.event.number }} @ ${{ github.event.pull_request.head.sha }}" \
            --json)
          echo "$out" | jq .
          echo "url=$(echo "$out" | jq -er .deploy_url)" >> "$GITHUB_OUTPUT"

      - name: verify the deploy serves this PR's tools bundle
        env:
          SHELL_URL: ${{ steps.deploy.outputs.url }}
          PACKAGE_LIST_URL: ${{ steps.bundle.outputs.url }}
        run: |
          set -o pipefail
          html=$(curl -sfL "$SHELL_URL")
          for asset in $(echo "$html" | grep -oE '/assets/[A-Za-z0-9_.-]+\.js' | sort -u); do
            if curl -sfL "$SHELL_URL$asset" | grep -qF "$PACKAGE_LIST_URL"; then
              echo "ok: $asset references $PACKAGE_LIST_URL"
              exit 0
            fi
          done
          echo "::error::deployed shell at $SHELL_URL does not reference $PACKAGE_LIST_URL"
          exit 1

      - uses: actions/github-script@v7
        env:
          SHELL_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = process.env.MARKER
            const sha = context.payload.pull_request.head.sha.slice(0, 7)
            const body = [
              marker,
              `### ✅ Patchwork glance ready`,
              ``,
              `## ${process.env.SHELL_URL}`,
              ``,
              `Patchwork from \`${process.env.SHELL_REPO}\`, packages from this PR at \`${sha}\`.`,
            ].join("\n")
            const {owner, repo} = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({owner, repo, issue_number})
            const existing = comments.data.find(c => c.body.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body})
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body})
            }

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - run: .github/scripts/netlify-purge-alias.sh

      - uses: actions/github-script@v7
        with:
          script: |
            const marker = process.env.MARKER
            const {owner, repo} = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({owner, repo, issue_number})
            const existing = comments.data.find(c => c.body.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id,
                body: `${marker}\n### 🪡 Patchwork preview\n\nTorn down.`,
              })
            }
